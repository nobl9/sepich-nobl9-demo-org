name: Example Governed App Deploy
run-name: >-
  Example Governed App Deploy /
  ${{ inputs.project || inputs.app_id || 'unknown-target' }} /
  ${{ inputs.service || 'all-services' }} /
  ${{ inputs.environment }}

on:
  workflow_dispatch:
    inputs:
      app_id:
        description: "Optional governed application ID from governed-apps.yaml"
        required: false
        type: string
      project:
        description: "Optional governed Nobl9 project name"
        required: false
        default: storefront-platform-demo
        type: string
      service:
        description: "Optional governed service name"
        required: false
        default: storefront
        type: string
      environment:
        description: "Deployment environment label"
        required: true
        default: production
        type: string
      replay_from:
        description: "Optional RFC3339 timestamp to replay SLO history from after deploy"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: example-governed-app-deploy-${{ inputs.environment }}-${{ inputs.project || inputs.app_id || 'unknown-target' }}-${{ inputs.service || 'all-services' }}
  cancel-in-progress: false

jobs:
  governance_gate:
    name: 1. Governance Gate
    uses: ./.github/workflows/slo-deployment-gate.yaml
    secrets: inherit
    with:
      app_id: ${{ inputs.app_id }}
      project: ${{ inputs.project }}
      service: ${{ inputs.service }}
      environment: ${{ inputs.environment }}

  deploy_application:
    name: 2. Deploy Application
    needs: governance_gate
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Simulate application deployment
        run: |
          echo "Replace this step with the real application deployment workflow."
          echo "Deploying governed target:"
          echo "  app_id=${{ inputs.app_id }}"
          echo "  project=${{ inputs.project }}"
          echo "  service=${{ inputs.service }}"
          echo "  environment=${{ inputs.environment }}"

      - name: Publish deployment summary
        run: |
          {
            echo "## Example Governed App Deploy"
            echo ""
            echo "- Status: \`app deployed\`"
            echo "- Environment: \`${{ inputs.environment }}\`"
            if [ -n "${{ inputs.app_id }}" ]; then
              echo "- App ID: \`${{ inputs.app_id }}\`"
            fi
            if [ -n "${{ inputs.project }}" ]; then
              echo "- Project: \`${{ inputs.project }}\`"
            fi
            if [ -n "${{ inputs.service }}" ]; then
              echo "- Service: \`${{ inputs.service }}\`"
            fi
            echo "- Note: Replace the placeholder deploy step with the real enterprise deployment logic."
          } >> "$GITHUB_STEP_SUMMARY"

  reconcile_nobl9:
    name: 3. Reconcile Nobl9
    needs: deploy_application
    uses: ./.github/workflows/slo-apply.yaml
    with:
      replay_from: ${{ inputs.replay_from }}
    secrets: inherit

  demo_summary:
    name: 4. Demo Run Summary
    if: ${{ always() }}
    needs:
      - governance_gate
      - deploy_application
      - reconcile_nobl9
    runs-on: ubuntu-latest
    steps:
      - name: Publish end-to-end summary
        run: |
          {
            echo "## Example Governed App Deploy"
            echo ""
            echo "### Inputs"
            echo ""
            echo "- Environment: \`${{ inputs.environment }}\`"
            if [ -n "${{ inputs.app_id }}" ]; then
              echo "- App ID: \`${{ inputs.app_id }}\`"
            fi
            if [ -n "${{ inputs.project }}" ]; then
              echo "- Project: \`${{ inputs.project }}\`"
            fi
            if [ -n "${{ inputs.service }}" ]; then
              echo "- Service: \`${{ inputs.service }}\`"
            fi
            echo ""
            echo "### Flow"
            echo ""
            echo "1. Governance gate checks whether the governed target is allowed to ship."
            echo "2. Application deployment runs only if the gate passes."
            echo "3. Nobl9 reconciliation updates live reliability state from the governed catalog."
            echo ""
            echo "### Job Results"
            echo ""
            echo "- Governance Gate: \`${{ needs.governance_gate.result }}\`"
            echo "- Deploy Application: \`${{ needs.deploy_application.result }}\`"
            echo "- Reconcile Nobl9: \`${{ needs.reconcile_nobl9.result }}\`"
            echo ""
            echo "### Outcome"
            echo ""
            if [ "${{ needs.governance_gate.result }}" = "failure" ]; then
              echo "- This release stopped at the governance gate."
              echo "- Deploy and Nobl9 reconcile were skipped on purpose."
              echo "- Open job \`1. Governance Gate\` for the blocking reasons and investigation link."
            elif [ "${{ needs.governance_gate.result }}" = "success" ] && [ "${{ needs.reconcile_nobl9.result }}" = "success" ]; then
              echo "- This run completed the full governed release path."
              echo "- The target passed the gate, the app deploy ran, and Nobl9 was reconciled from Git."
            else
              echo "- This run moved past the gate, but a later step needs attention."
              echo "- Use the job results above to see whether deploy or reconcile needs follow-up."
            fi
            echo ""
            echo "### Demo Reading Guide"
            echo ""
            echo "- Red first job = policy blocked the release."
            echo "- Green first job = governance allowed the release to continue."
            echo "- All green = full gate -> deploy -> reconcile path completed."
          } >> "$GITHUB_STEP_SUMMARY"
