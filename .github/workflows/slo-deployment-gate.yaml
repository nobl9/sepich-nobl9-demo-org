name: Nobl9 Deployment Gate
run-name: >-
  Nobl9 Deployment Gate /
  ${{ inputs.project || inputs.app_id || 'unknown-target' }} /
  ${{ inputs.service || 'all-services' }} /
  ${{ inputs.environment || 'production' }}

env:
  SLOCTL_VERSION: "0.22.0"

on:
  workflow_dispatch:
    inputs:
      app_id:
        description: "Optional governed application ID from governed-apps.yaml"
        required: false
        type: string
      project:
        description: "Optional governed Nobl9 project name"
        required: false
        default: storefront-platform-demo
        type: string
      service:
        description: "Optional governed service name"
        required: false
        default: storefront
        type: string
      environment:
        description: "Deployment environment label"
        required: true
        default: production
        type: string
  workflow_call:
    inputs:
      app_id:
        description: "Optional governed application ID from governed-apps.yaml"
        required: false
        type: string
      project:
        description: "Optional governed Nobl9 project name"
        required: false
        type: string
      service:
        description: "Optional governed service name"
        required: false
        type: string
      environment:
        description: "Deployment environment label"
        required: false
        default: production
        type: string
    secrets:
      NOBL9_CLIENT_ID:
        required: false
      NOBL9_CLIENT_SECRET:
        required: false

permissions:
  contents: read

concurrency:
  group: nobl9-deployment-gate-${{ inputs.environment || 'production' }}-${{ inputs.project || inputs.app_id || 'unknown-target' }}-${{ inputs.service || 'all-services' }}
  cancel-in-progress: false

jobs:
  gate:
    name: 1. Evaluate Deployment Gate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: python3 -m pip install PyYAML

      - name: Install sloctl
        run: |
          curl -fsSL \
            -o "$RUNNER_TEMP/sloctl" \
            "https://github.com/nobl9/sloctl/releases/download/v${SLOCTL_VERSION}/sloctl-${SLOCTL_VERSION}-linux-amd64"
          chmod +x "$RUNNER_TEMP/sloctl"
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"

      - name: Publish deployment gate summary
        id: gate_summary
        continue-on-error: true
        shell: bash
        env:
          SLOCTL_CLIENT_ID: ${{ secrets.NOBL9_CLIENT_ID }}
          SLOCTL_CLIENT_SECRET: ${{ secrets.NOBL9_CLIENT_SECRET }}
        run: |
          gate_output="$RUNNER_TEMP/gate-output.md"
          {
            echo "## Nobl9 Deployment Gate"
            echo ""
            echo "- Environment: \`${{ inputs.environment || 'production' }}\`"
            if [ -n "${{ inputs.app_id }}" ]; then
              echo "- App ID: \`${{ inputs.app_id }}\`"
            fi
            if [ -n "${{ inputs.project }}" ]; then
              echo "- Project: \`${{ inputs.project }}\`"
            fi
            if [ -n "${{ inputs.service }}" ]; then
              echo "- Service: \`${{ inputs.service }}\`"
            fi
            echo ""
            echo "### Gate Result"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"
          args=(--environment "${{ inputs.environment || 'production' }}" --markdown)
          if [ -n "${{ inputs.app_id }}" ]; then
            args+=(--app-id "${{ inputs.app_id }}")
          fi
          if [ -n "${{ inputs.project }}" ]; then
            args+=(--project "${{ inputs.project }}")
          fi
          if [ -n "${{ inputs.service }}" ]; then
            args+=(--service "${{ inputs.service }}")
          fi
          gate_exit=0
          python3 scripts/slo_governance.py deploy-gate "${args[@]}" > "$gate_output" || gate_exit=$?
          cat "$gate_output" >> "$GITHUB_STEP_SUMMARY"
          error_count="$(grep -c '^- Error:' "$gate_output" || true)"
          warning_count="$(grep -c '^- Warning:' "$gate_output" || true)"
          echo "error_count=$error_count" >> "$GITHUB_OUTPUT"
          echo "warning_count=$warning_count" >> "$GITHUB_OUTPUT"
          echo "### What happened" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "$gate_exit" != "0" ]; then
            echo "- Result: this release was **blocked** by the governance gate." >> "$GITHUB_STEP_SUMMARY"
            echo "- Why: one or more policy checks failed for this governed target." >> "$GITHUB_STEP_SUMMARY"
            if [ "$error_count" != "0" ]; then
              echo "- Blocking reasons:" >> "$GITHUB_STEP_SUMMARY"
              grep '^- Error:' "$gate_output" | sed 's/^- Error: /  - /' | head -5 >> "$GITHUB_STEP_SUMMARY"
            fi
            if [ "$warning_count" != "0" ]; then
              echo "- Additional warnings:" >> "$GITHUB_STEP_SUMMARY"
              grep '^- Warning:' "$gate_output" | sed 's/^- Warning: /  - /' | head -5 >> "$GITHUB_STEP_SUMMARY"
            fi
            {
              echo ""
              echo "### What to do next"
              echo ""
              echo "- Open the Nobl9 investigation link above to inspect the affected project."
              echo "- Update the governed catalog or the live SLO configuration so the target meets policy."
              echo "- Rerun this workflow to confirm the gate passes."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Result: this governed target is **allowed to move forward** in the release flow." >> "$GITHUB_STEP_SUMMARY"
            if [ "$warning_count" != "0" ]; then
              echo "- Warnings to review:" >> "$GITHUB_STEP_SUMMARY"
              grep '^- Warning:' "$gate_output" | sed 's/^- Warning: /  - /' | head -5 >> "$GITHUB_STEP_SUMMARY"
            fi
          fi
          echo "gate_exit=$gate_exit" >> "$GITHUB_OUTPUT"

      - name: Enforce deployment gate
        shell: bash
        env:
          SLOCTL_CLIENT_ID: ${{ secrets.NOBL9_CLIENT_ID }}
          SLOCTL_CLIENT_SECRET: ${{ secrets.NOBL9_CLIENT_SECRET }}
        run: |
          if [ "${{ steps.gate_summary.outputs.gate_exit }}" != "0" ]; then
            echo "Deployment gate blocked this release. See the summary above for details." >&2
            exit "${{ steps.gate_summary.outputs.gate_exit }}"
          fi

      - name: Publish gate explanation
        if: ${{ success() }}
        run: |
          {
            echo ""
            echo "### What this proves"
            echo ""
            echo "- The governed target was evaluated against the repo's deployment-time SLO policy."
            echo "- A passing run means this target is currently allowed to move forward in the release flow."
          } >> "$GITHUB_STEP_SUMMARY"
