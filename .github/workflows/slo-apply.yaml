name: Apply Nobl9 Org Catalog
run-name: >-
  Apply Nobl9 Org Catalog /
  ${{ inputs.replay_from != '' && 'replay' || 'standard' }}

env:
  SLOCTL_VERSION: "0.22.0"

on:
  workflow_dispatch:
    inputs:
      replay_from:
        description: "Optional RFC3339 timestamp to replay SLO history from"
        required: false
        type: string
  workflow_call:
    inputs:
      replay_from:
        description: "Optional RFC3339 timestamp to replay SLO history from"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: nobl9-demo-org-apply
  cancel-in-progress: false

jobs:
  apply:
    name: 3. Reconcile Nobl9 Catalog
    runs-on: ubuntu-latest
    environment: nobl9-demo

    steps:
      - name: Require the main branch
        run: |
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "Run this workflow from the main branch only." >&2
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Publish apply summary header
        run: |
          {
            echo "## Apply Nobl9 Org Catalog"
            echo ""
            echo "- Branch: \`${GITHUB_REF_NAME}\`"
            if [ -n "${{ inputs.replay_from }}" ]; then
              echo "- Replay from: \`${{ inputs.replay_from }}\`"
            else
              echo "- Replay from: \`not requested\`"
            fi
            echo ""
            echo "### Reconcile Steps"
            echo ""
            echo "- Validate governed catalog"
            echo "- Check apply readiness"
            echo "- Apply governed manifests to Nobl9"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: python3 -m pip install PyYAML

      - name: Validate governance rules
        run: python3 scripts/slo_governance.py validate

      - name: Check apply readiness
        run: python3 scripts/slo_governance.py apply-readiness

      - name: Install sloctl
        run: |
          curl -fsSL \
            -o "$RUNNER_TEMP/sloctl" \
            "https://github.com/nobl9/sloctl/releases/download/v${SLOCTL_VERSION}/sloctl-${SLOCTL_VERSION}-linux-amd64"
          chmod +x "$RUNNER_TEMP/sloctl"
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"

      - name: Apply catalog
        if: ${{ inputs.replay_from == '' }}
        env:
          SLOCTL_CLIENT_ID: ${{ secrets.NOBL9_CLIENT_ID }}
          SLOCTL_CLIENT_SECRET: ${{ secrets.NOBL9_CLIENT_SECRET }}
          SLOCTL_FILES_PROMPT_ENABLED: "false"
        run: sloctl --no-config-file apply -y -f 'catalog/projects/**/*.yaml'

      - name: Apply catalog and replay SLO history
        if: ${{ inputs.replay_from != '' }}
        env:
          SLOCTL_CLIENT_ID: ${{ secrets.NOBL9_CLIENT_ID }}
          SLOCTL_CLIENT_SECRET: ${{ secrets.NOBL9_CLIENT_SECRET }}
          SLOCTL_FILES_PROMPT_ENABLED: "false"
        run: sloctl --no-config-file apply -y -f 'catalog/projects/**/*.yaml' --replay --from="${{ inputs.replay_from }}"

      - name: Publish apply completion
        if: ${{ success() }}
        run: |
          {
            echo ""
            echo "### Result"
            echo ""
            echo "- Status: \`governed catalog reconciled\`"
            echo "- Meaning: live Nobl9 has been updated from the Git-governed catalog."
          } >> "$GITHUB_STEP_SUMMARY"
