- apiVersion: n9/v1alpha
  kind: SLO
  metadata:
    displayName: "AI Interpretation - Latency (Staging)"
    labels:
      environment:
      - staging
    name: ai-interpretation-latency-staging
    project: nobl9-slack-app
  spec:
    budgetingMethod: Timeslices
    createdAt: "2026-04-07T11:36:03Z"
    createdBy: 00uem4p1xJYEnV0Uc416
    description: "User journey: User types a natural language query that falls back to AI interpretation\nWhat we measure: P95 latency of successful AI interpretation requests vs 10s threshold\nTarget: 95% of evaluation periods have p95 latency under 10s\n\nWhy this matters: Users see 'Thinking...' while AI processes; slow responses degrade experience\nWhy 10s: Leaves 12s buffer before the 22s Lambda timeout that triggers a hard failure\n\nSLI: histogram_quantile p95 over 1h window, compared against 10000ms threshold\nNo-traffic periods return 0ms (under threshold = good, no budget burn)\n"
    indicator:
      metricSource:
        kind: Agent
        name: groundcover-n9slackapp
        project: nobl9-slack-app
    objectives:
    - displayName: p95 under 10s
      name: objective-1
      op: lte
      rawMetric:
        query:
          prometheus:
            promql: histogram_quantile(0.95, sum by (le) (increase(n9slackapp_ai_duration_milliseconds_bucket{environment="staging",ai_status="success"}[1h]))) OR vector(0)
      target: 0.95
      timeSliceTarget: 0.95
      value: 10000
    service: slack-bot
    timeWindows:
    - count: 7
      isRolling: true
      period:
        begin: "2026-04-23T13:54:47Z"
        end: "2026-04-30T13:54:47Z"
      unit: Day
  status:
    replay:
      cancellation: blocked
      endTime: "2026-04-07T11:37:03Z"
      startTime: "2026-03-30T23:55:52Z"
      status: completed
      triggeredBy: 00uem4p1xJYEnV0Uc416
      unit: Day
      value: 7
    review:
      status: notStarted
    updatedAt: "2026-04-07T11:36:03Z"
