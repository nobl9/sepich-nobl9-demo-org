- apiVersion: n9/v1alpha
  kind: SLO
  metadata:
    displayName: "Slash Command - System Availability (Staging)"
    labels:
      environment:
      - staging
    name: slash-command-system-availability-staging
    project: nobl9-slack-app
  spec:
    budgetingMethod: Occurrences
    createdAt: "2026-01-30T20:42:58Z"
    createdBy: 00uem4p1xJYEnV0Uc416
    description: "User journey: DevOps/SRE teams execute Slack commands to manage SLOs\nWhat we measure: System availability for all slash command interactions\nTarget: 99.5% of commands succeed without system failures\n\nWhy this matters: Failed commands block teams from managing SLOs and viewing error budgets\nWhy 99.5%: Allows ~7 hours/month for maintenance while maintaining high reliability\n\nExcludes from denominator (user errors):\n- Authentication failures (bad credentials)\n- Validation errors (invalid syntax)\n- Not found errors (resource doesn't exist)\n\nGood events: success + user_error\nTotal events: all requests\nSLI = (success + user_error) / total\n"
    indicator:
      metricSource:
        kind: Direct
        name: cloudwatch-n9slackapp
        project: nobl9-slack-app
    objectives:
    - countMetrics:
        good:
          cloudWatch:
            json: "[\n  {\n    \"Id\": \"success_metric\",\n    \"MetricStat\": {\n      \"Metric\": {\n        \"Namespace\": \"Nobl9SlackApp\",\n        \"MetricName\": \"CommandResponseTime\",\n        \"Dimensions\": [\n          {\"Name\": \"Environment\", \"Value\": \"staging\"},\n          {\"Name\": \"Status\", \"Value\": \"success\"}\n        ]\n      },\n      \"Period\": 60,\n      \"Stat\": \"SampleCount\"\n    },\n    \"ReturnData\": false\n  },\n  {\n    \"Id\": \"user_error_metric\",\n    \"MetricStat\": {\n      \"Metric\": {\n        \"Namespace\": \"Nobl9SlackApp\",\n        \"MetricName\": \"CommandResponseTime\",\n        \"Dimensions\": [\n          {\"Name\": \"Environment\", \"Value\": \"staging\"},\n          {\"Name\": \"Status\", \"Value\": \"user_error\"}\n        ]\n      },\n      \"Period\": 60,\n      \"Stat\": \"SampleCount\"\n    },\n    \"ReturnData\": false\n  },\n  {\n    \"Id\": \"success_filled\",\n    \"Expression\": \"FILL(success_metric, 0)\",\n    \"Period\": 60,\n    \"ReturnData\": false\n  },\n  {\n    \"Id\": \"user_error_filled\",\n    \"Expression\": \"FILL(user_error_metric, 0)\",\n    \"Period\": 60,\n    \"ReturnData\": false\n  },\n  {\n    \"Id\": \"good_total\",\n    \"Expression\": \"success_filled + user_error_filled\",\n    \"Period\": 60,\n    \"ReturnData\": true\n  }\n]\n"
            region: eu-central-1
        incremental: false
        total:
          cloudWatch:
            json: "[\n  {\n    \"Id\": \"total_metric\",\n    \"MetricStat\": {\n      \"Metric\": {\n        \"Namespace\": \"Nobl9SlackApp\",\n        \"MetricName\": \"CommandResponseTime\",\n        \"Dimensions\": [\n          {\"Name\": \"Environment\", \"Value\": \"staging\"}\n        ]\n      },\n      \"Period\": 60,\n      \"Stat\": \"SampleCount\"\n    },\n    \"ReturnData\": false\n  },\n  {\n    \"Id\": \"total_filled\",\n    \"Expression\": \"FILL(total_metric, 0)\",\n    \"Period\": 60,\n    \"ReturnData\": true\n  }\n]\n"
            region: eu-central-1
      displayName: 99.5% System Availability
      name: objective-1
      target: 0.995
      value: 0
    service: slack-bot
    timeWindows:
    - count: 7
      isRolling: true
      period:
        begin: "2026-04-23T13:54:47Z"
        end: "2026-04-30T13:54:47Z"
      unit: Day
  status:
    review:
      status: notStarted
    updatedAt: "2026-01-30T20:42:58Z"
