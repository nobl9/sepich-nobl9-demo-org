- apiVersion: n9/v1alpha
  kind: SLO
  metadata:
    displayName: "Event Handler - System Availability (Production)"
    labels:
      environment:
      - production
    name: event-handler-availability-production
    project: nobl9-slack-app
  spec:
    budgetingMethod: Timeslices
    createdAt: "2026-04-07T13:47:00Z"
    createdBy: 00uem4p1xJYEnV0Uc416
    description: "User journey: Users open App Home, @mention the bot, or send DMs for AI-powered queries\nWhat we measure: System availability for Slack event processing\nTarget: 99% of time slices have availability at or above 99%\n\nWhy this matters: Failed events mean broken App Home, unresponsive @mentions, and silent DM failures\nWhy 99%: Events include async AI processing and external API calls; slightly more tolerance than slash commands\n\nSLI: success / (success + system_error) over 1h window\nNo-traffic periods return 1.0 (100% available, no budget burn)\n"
    indicator:
      metricSource:
        kind: Agent
        name: groundcover-n9slackapp
        project: nobl9-slack-app
    objectives:
    - displayName: 99% System Availability
      name: objective-1
      op: gte
      rawMetric:
        query:
          prometheus:
            promql: sum(increase(n9slackapp_event_duration_milliseconds_count{environment="production",status="success"}[1h])) / sum(increase(n9slackapp_event_duration_milliseconds_count{environment="production",status=~"success|system_error"}[1h])) OR vector(1)
      target: 0.99
      timeSliceTarget: 0.99
      value: 0.99
    service: slack-bot
    timeWindows:
    - count: 7
      isRolling: true
      period:
        begin: "2026-04-23T13:54:47Z"
        end: "2026-04-30T13:54:47Z"
      unit: Day
  status:
    replay:
      cancellation: blocked
      endTime: "2026-04-07T13:52:19Z"
      startTime: "2026-03-30T23:55:18Z"
      status: completed
      triggeredBy: 00uem4p1xJYEnV0Uc416
      unit: Day
      value: 7
    review:
      status: notStarted
    updatedAt: "2026-04-07T13:47:00Z"
