- apiVersion: n9/v1alpha
  kind: SLO
  metadata:
    displayName: "Webhook Delivery - Latency (Staging)"
    labels:
      environment:
      - staging
    name: webhook-delivery-latency-staging
    project: nobl9-slack-app
  spec:
    budgetingMethod: Timeslices
    createdAt: "2026-04-07T11:36:04Z"
    createdBy: 00uem4p1xJYEnV0Uc416
    description: "User journey: Nobl9 sends alert webhooks that get delivered to Slack channels\nWhat we measure: P95 latency of successful webhook deliveries vs 3s threshold\nTarget: 99% of evaluation periods have p95 latency under 3s\n\nWhy this matters: Delayed alert delivery means teams miss critical SLO violations\nWhy 3s: Webhook processing includes S3 cache write + Slack API post; more latency budget than slash commands\n\nSLI: histogram_quantile p95 over 1h window, compared against 3000ms threshold\nNo-traffic periods return 0ms (under threshold = good, no budget burn)\n"
    indicator:
      metricSource:
        kind: Agent
        name: groundcover-n9slackapp
        project: nobl9-slack-app
    objectives:
    - displayName: p95 under 3s
      name: objective-1
      op: lte
      rawMetric:
        query:
          prometheus:
            promql: histogram_quantile(0.95, sum by (le) (increase(n9slackapp_webhook_duration_milliseconds_bucket{environment="staging",status="success"}[1h]))) OR vector(0)
      target: 0.99
      timeSliceTarget: 0.99
      value: 3000
    service: slack-bot
    timeWindows:
    - count: 7
      isRolling: true
      period:
        begin: "2026-04-23T13:54:47Z"
        end: "2026-04-30T13:54:47Z"
      unit: Day
  status:
    replay:
      cancellation: blocked
      endTime: "2026-04-07T11:51:18Z"
      startTime: "2026-03-30T23:55:57Z"
      status: completed
      triggeredBy: 00uem4p1xJYEnV0Uc416
      unit: Day
      value: 7
    review:
      status: notStarted
    updatedAt: "2026-04-07T11:36:04Z"
