    description: "User journey: SRE teams receive scheduled SLO dashboards at predictable times\nWhat we measure: P95 delivery lateness vs 60s threshold\nTarget: 95% of evaluation periods have p95 lateness under 60s\n\nWhy this matters: Late dashboards undermine team trust in the scheduling feature\nWhy 60s: EventBridge has inherent scheduling jitter; 60s is a reasonable tolerance\n\nSLI: histogram_quantile p95 over 1h window, compared against 60s threshold\nNo-traffic periods return 0s (under threshold = good, no budget burn)\n"
    indicator:
      metricSource:
        kind: Agent
        name: groundcover-n9slackapp
        project: nobl9-slack-app
    objectives:
    - displayName: p95 under 60s
      name: objective-1
      op: lte
      rawMetric:
        query:
          prometheus:
            promql: histogram_quantile(0.95, sum by (le) (increase(n9slackapp_dashboard_lateness_seconds_bucket{environment="staging",status="success"}[1h]))) OR vector(0)
      target: 0.95
      timeSliceTarget: 0.95
      value: 60
    service: slack-bot
    timeWindows:
