    description: "User journey: Nobl9 sends alert webhooks that get delivered to Slack channels\nWhat we measure: System availability for webhook alert delivery\nTarget: 99% of time slices have availability at or above 99%\n\nWhy this matters: Failed alert delivery means teams miss critical SLO violations\nWhy 99%: Webhooks depend on external Slack API; allows headroom for transient Slack outages\n\nSLI: success / (success + system_error + slack_error + auth_error) over 1h window\nNo-traffic periods return 1.0 (100% available, no budget burn)\n"
    indicator:
      metricSource:
        kind: Agent
        name: groundcover-n9slackapp
        project: nobl9-slack-app
    objectives:
    - displayName: 99% System Availability
      name: objective-1
      op: gte
      rawMetric:
        query:
          prometheus:
            promql: sum(increase(n9slackapp_webhook_duration_milliseconds_count{environment="staging",status="success"}[1h])) / sum(increase(n9slackapp_webhook_duration_milliseconds_count{environment="staging",status=~"success|system_error|slack_error|auth_error"}[1h])) OR vector(1)
      target: 0.99
      timeSliceTarget: 0.99
      value: 0.99
    service: slack-bot
    timeWindows:
