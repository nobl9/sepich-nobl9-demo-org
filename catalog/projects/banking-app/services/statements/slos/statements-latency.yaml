apiVersion: n9/v1alpha
kind: SLO
metadata:
  displayName: View Statements Latency
  name: statements-latency
  project: banking-app
spec:
  alertPolicies:
  - 10-error-budget-drop-over-10-min
  budgetingMethod: Occurrences
  description: Latency on a user pulling up their statements
  indicator:
    metricSource:
      kind: Direct
      name: appdynamics
      project: integrations
  objectives:
  - displayName: Latency
    name: statements-latency
    op: lt
    primary: false
    rawMetric:
      query:
        appDynamics:
          applicationName: samplenodeapp
          metricPath: Overall Application Performance|Average Response Time (ms)
    target: 0.99
    value: 460
  service: statements
  timeWindows:
  - count: 28
    isRolling: true
    unit: Day
