apiVersion: n9/v1alpha
kind: AlertPolicy
metadata:
  displayName: 10% Error Budget Drop Over 10 Min
  name: 10-error-budget-drop-over-10-min
  project: banking-app
  labels:
    app-id:
    - app-26f8ef6c
    ad-group-name:
    - AD-N9-DigitalBankingPlatform-Owners
    cost-center:
    - CC-1000
    business-unit:
    - Demo Platforms
    env-type:
    - prod
    business-criticality-tier:
    - tier1
spec:
  alertMethods: []
  conditions:
  - alertingWindow: 15m
    measurement: budgetDrop
    op: gte
    value: 0.1
  coolDown: 5m
  description: The budget dropped by 10% over the last 15 minutes and is not recovering.
  severity: High
