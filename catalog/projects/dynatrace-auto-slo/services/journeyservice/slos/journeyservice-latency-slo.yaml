apiVersion: n9/v1alpha
kind: SLO
metadata:
  displayName: Latency Objective 2
  labels:
    api:
    - 'true'
  name: journeyservice-latency-slo
  project: dynatrace-auto-slo
spec:
  budgetingMethod: Occurrences
  description: ''
  indicator:
    metricSource:
      kind: Direct
      name: glitchy-zoomies
      project: integrations
  objectives:
  - displayName: Latency
    name: latency
    op: lte
    primary: true
    rawMetric:
      query:
        gcm:
          projectId: glitchy-zoomies
          promql: 1000 * histogram_quantile(0.90, sum by (le) (rate(demo_request_duration_seconds_bucket{service="recommendations",path="/work"}[1m])))
    target: 0.95
    value: 600
  service: journeyservice
  timeWindows:
  - count: 28
    isRolling: true
    unit: Day
