apiVersion: n9/v1alpha
kind: SLO
metadata:
  displayName: Tick-to-Quote
  name: 1492dcc1-1131-44fb-8826-4a591fd5b145
  project: front-arena
spec:
  budgetingMethod: Occurrences
  description: Latency of search results
  indicator:
    metricSource:
      kind: Direct
      name: glitchy-zoomies
      project: integrations
  objectives:
  - displayName: Latency
    name: objective-1
    op: lte
    primary: false
    rawMetric:
      query:
        gcm:
          projectId: glitchy-zoomies
          promql: 1000 * histogram_quantile(0.90, sum by (le) (rate(demo_request_duration_seconds_bucket{service="recommendations",path="/work"}[1m])))
    target: 0.95
    value: 600
  service: arena-quote-engine
  timeWindows:
  - count: 28
    isRolling: true
    unit: Day
