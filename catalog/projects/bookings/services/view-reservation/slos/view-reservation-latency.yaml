apiVersion: n9/v1alpha
kind: SLO
metadata:
  displayName: View Booking Latency
  name: view-reservation-latency
  project: bookings
spec:
  budgetingMethod: Occurrences
  description: Latency of viewing reservations API
  indicator:
    metricSource:
      kind: Direct
      name: glitchy-zoomies
      project: integrations
  objectives:
  - displayName: Latency
    name: objective-1
    op: lte
    rawMetric:
      query:
        gcm:
          projectId: glitchy-zoomies
          promql: 1000 * histogram_quantile(0.90, sum by (le) (rate(demo_request_duration_seconds_bucket{service="landing_page",path="/api/visit"}[1m])))
    target: 0.95
    value: 2000
  service: view-reservation
  timeWindows:
  - count: 28
    isRolling: true
    unit: Day
