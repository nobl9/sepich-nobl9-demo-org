apiVersion: n9/v1alpha
kind: SLO
metadata:
  displayName: Interactive Response - Latency (Production)
  labels:
    environment:
    - production
  name: interactive-response-p95-latency-production
  project: nobl9-slack-app
spec:
  budgetingMethod: Timeslices
  description: 'User journey: Users interact with modals and buttons (auth, schedules,
    annotations, budget adjustments, alert silencing)

    What we measure: P95 latency of successful interactive requests vs 2s threshold

    Target: 95% of evaluation periods have p95 latency under 2s


    Why this matters: Slack enforces a 3-second timeout for modal triggers; slow responses
    = broken modals

    Why 2s: Provides 1s buffer before Slack''s hard 3s timeout on modal open


    SLI: histogram_quantile p95 over 1h window, compared against 2000ms threshold

    No-traffic periods return 0ms (under threshold = good, no budget burn)

    '
  indicator:
    metricSource:
      kind: Agent
      name: groundcover-n9slackapp
      project: nobl9-slack-app
  objectives:
  - displayName: p95 under 2s
    name: objective-1
    op: lte
    rawMetric:
      query:
        prometheus:
          promql: histogram_quantile(0.95, sum by (le) (increase(n9slackapp_interactive_duration_milliseconds_bucket{environment="production",status="success"}[1h])))
            OR vector(0)
    target: 0.95
    timeSliceTarget: 0.95
    value: 2000
  service: slack-bot
  timeWindows:
  - count: 7
    isRolling: true
    unit: Day
