apiVersion: n9/v1alpha
kind: SLO
metadata:
  displayName: Slash Command - P95 Latency (Staging)
  labels:
    environment:
    - staging
  name: slash-command-p95-latency-staging
  project: nobl9-slack-app
spec:
  budgetingMethod: Timeslices
  description: 'User journey: DevOps/SRE teams execute Slack commands to manage SLOs

    What we measure: P95 response time for successful slash command executions

    Target: 95% of 1-minute timeslices have P95 latency under 2 seconds


    Why this matters: Slow responses degrade DevOps workflow productivity

    Why 2s: Slack best practice is <3s response; 2s provides buffer for complex queries

    Why P95: Captures typical user experience while allowing outliers (P99 too strict
    for Slack)


    Only successful requests measured (excludes errors which may timeout)

    SLI = percentage of timeslices where P95 <= 2000ms

    '
  indicator:
    metricSource:
      kind: Direct
      name: cloudwatch-n9slackapp
      project: nobl9-slack-app
  objectives:
  - displayName: P95 < 2s
    name: objective-1
    op: lte
    rawMetric:
      query:
        cloudWatch:
          json: "[\n  {\n    \"Id\": \"p95_metric\",\n    \"MetricStat\": {\n    \
            \  \"Metric\": {\n        \"Namespace\": \"Nobl9SlackApp\",\n        \"\
            MetricName\": \"CommandResponseTime\",\n        \"Dimensions\": [\n  \
            \        {\"Name\": \"Environment\", \"Value\": \"staging\"},\n      \
            \    {\"Name\": \"Status\", \"Value\": \"success\"}\n        ]\n     \
            \ },\n      \"Period\": 60,\n      \"Stat\": \"p95\"\n    },\n    \"ReturnData\"\
            : false\n  },\n  {\n    \"Id\": \"p95_filled\",\n    \"Expression\": \"\
            FILL(p95_metric, 0)\",\n    \"Period\": 60,\n    \"ReturnData\": true\n\
            \  }\n]\n"
          region: eu-central-1
    target: 0.95
    timeSliceTarget: 0.95
    value: 2000
  service: slack-bot
  timeWindows:
  - count: 7
    isRolling: true
    unit: Day
