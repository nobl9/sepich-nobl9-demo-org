apiVersion: n9/v1alpha
kind: SLO
metadata:
  displayName: Webhook Delivery - Latency (Staging)
  labels:
    environment:
    - staging
  name: webhook-delivery-latency-staging
  project: nobl9-slack-app
spec:
  budgetingMethod: Timeslices
  description: 'User journey: Nobl9 sends alert webhooks that get delivered to Slack
    channels

    What we measure: P95 latency of successful webhook deliveries vs 3s threshold

    Target: 99% of evaluation periods have p95 latency under 3s


    Why this matters: Delayed alert delivery means teams miss critical SLO violations

    Why 3s: Webhook processing includes S3 cache write + Slack API post; more latency
    budget than slash commands


    SLI: histogram_quantile p95 over 1h window, compared against 3000ms threshold

    No-traffic periods return 0ms (under threshold = good, no budget burn)

    '
  indicator:
    metricSource:
      kind: Agent
      name: groundcover-n9slackapp
      project: nobl9-slack-app
  objectives:
  - displayName: p95 under 3s
    name: objective-1
    op: lte
    rawMetric:
      query:
        prometheus:
          promql: histogram_quantile(0.95, sum by (le) (increase(n9slackapp_webhook_duration_milliseconds_bucket{environment="staging",status="success"}[1h])))
            OR vector(0)
    target: 0.99
    timeSliceTarget: 0.99
    value: 3000
  service: slack-bot
  timeWindows:
  - count: 7
    isRolling: true
    unit: Day
