apiVersion: n9/v1alpha
kind: SLO
metadata:
  displayName: Interactive Response - System Availability (Staging)
  labels:
    environment:
    - staging
  name: interactive-response-availability-staging
  project: nobl9-slack-app
spec:
  budgetingMethod: Timeslices
  description: 'User journey: Users interact with modals and buttons (auth, schedules,
    annotations, budget adjustments, alert silencing)

    What we measure: System availability for all interactive handler operations

    Target: 99.5% of time slices have availability at or above 99.5%


    Why this matters: Failed modals block users from configuring auth, creating schedules,
    silencing alerts

    Why 99.5%: Same reliability target as slash commands (allows ~7 hours/month for
    maintenance)


    SLI: (success + user_error) / total over 1h window

    No-traffic periods return 1.0 (100% available, no budget burn)

    '
  indicator:
    metricSource:
      kind: Agent
      name: groundcover-n9slackapp
      project: nobl9-slack-app
  objectives:
  - displayName: 99.5% System Availability
    name: objective-1
    op: gte
    rawMetric:
      query:
        prometheus:
          promql: sum(increase(n9slackapp_interactive_duration_milliseconds_count{environment="staging",status=~"success|user_error"}[1h]))
            / sum(increase(n9slackapp_interactive_duration_milliseconds_count{environment="staging"}[1h]))
            OR vector(1)
    target: 0.995
    timeSliceTarget: 0.995
    value: 0.995
  service: slack-bot
  timeWindows:
  - count: 7
    isRolling: true
    unit: Day
