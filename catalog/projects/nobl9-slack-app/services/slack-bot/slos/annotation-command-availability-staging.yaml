apiVersion: n9/v1alpha
kind: SLO
metadata:
  displayName: Annotation Command - System Availability (Staging)
  labels:
    environment:
    - staging
  name: annotation-command-availability-staging
  project: nobl9-slack-app
spec:
  budgetingMethod: Occurrences
  description: 'User journey: SRE teams create annotations on SLOs to mark incidents,
    deployments, config changes

    What we measure: System availability specifically for annotation creation commands

    Target: 99.5% of annotation commands succeed without system failures


    Why this matters: Failed annotations mean teams lose critical incident correlation
    data

    Why separate SLO: High-value write operation vulnerable to schema changes

    Why 99.5%: Same reliability target as general commands (allows ~7 hours/month
    for maintenance)


    Excludes from denominator (user errors):

    - Authentication failures (bad credentials)

    - Validation errors (invalid annotation data, missing required fields)

    - Not found errors (SLO doesn''t exist)


    Good events: success + user_error

    Total events: all annotation command requests

    SLI = (success + user_error) / total

    '
  indicator:
    metricSource:
      kind: Direct
      name: cloudwatch-n9slackapp
      project: nobl9-slack-app
  objectives:
  - countMetrics:
      good:
        cloudWatch:
          json: "[\n  {\n    \"Id\": \"success_metric\",\n    \"MetricStat\": {\n\
            \      \"Metric\": {\n        \"Namespace\": \"Nobl9SlackApp\",\n    \
            \    \"MetricName\": \"CommandResponseTime\",\n        \"Dimensions\"\
            : [\n          {\"Name\": \"Environment\", \"Value\": \"staging\"},\n\
            \          {\"Name\": \"CommandType\", \"Value\": \"create-annotation\"\
            },\n          {\"Name\": \"Status\", \"Value\": \"success\"}\n       \
            \ ]\n      },\n      \"Period\": 60,\n      \"Stat\": \"SampleCount\"\n\
            \    },\n    \"ReturnData\": false\n  },\n  {\n    \"Id\": \"user_error_metric\"\
            ,\n    \"MetricStat\": {\n      \"Metric\": {\n        \"Namespace\":\
            \ \"Nobl9SlackApp\",\n        \"MetricName\": \"CommandResponseTime\"\
            ,\n        \"Dimensions\": [\n          {\"Name\": \"Environment\", \"\
            Value\": \"staging\"},\n          {\"Name\": \"CommandType\", \"Value\"\
            : \"create-annotation\"},\n          {\"Name\": \"Status\", \"Value\"\
            : \"user_error\"}\n        ]\n      },\n      \"Period\": 60,\n      \"\
            Stat\": \"SampleCount\"\n    },\n    \"ReturnData\": false\n  },\n  {\n\
            \    \"Id\": \"success_filled\",\n    \"Expression\": \"FILL(success_metric,\
            \ 0)\",\n    \"Period\": 60,\n    \"ReturnData\": false\n  },\n  {\n \
            \   \"Id\": \"user_error_filled\",\n    \"Expression\": \"FILL(user_error_metric,\
            \ 0)\",\n    \"Period\": 60,\n    \"ReturnData\": false\n  },\n  {\n \
            \   \"Id\": \"good_total\",\n    \"Expression\": \"success_filled + user_error_filled\"\
            ,\n    \"Period\": 60,\n    \"ReturnData\": true\n  }\n]\n"
          region: eu-central-1
      incremental: false
      total:
        cloudWatch:
          json: "[\n  {\n    \"Id\": \"success_metric\",\n    \"MetricStat\": {\n\
            \      \"Metric\": {\n        \"Namespace\": \"Nobl9SlackApp\",\n    \
            \    \"MetricName\": \"CommandResponseTime\",\n        \"Dimensions\"\
            : [\n          {\"Name\": \"Environment\", \"Value\": \"staging\"},\n\
            \          {\"Name\": \"CommandType\", \"Value\": \"create-annotation\"\
            },\n          {\"Name\": \"Status\", \"Value\": \"success\"}\n       \
            \ ]\n      },\n      \"Period\": 60,\n      \"Stat\": \"SampleCount\"\n\
            \    },\n    \"ReturnData\": false\n  },\n  {\n    \"Id\": \"user_error_metric\"\
            ,\n    \"MetricStat\": {\n      \"Metric\": {\n        \"Namespace\":\
            \ \"Nobl9SlackApp\",\n        \"MetricName\": \"CommandResponseTime\"\
            ,\n        \"Dimensions\": [\n          {\"Name\": \"Environment\", \"\
            Value\": \"staging\"},\n          {\"Name\": \"CommandType\", \"Value\"\
            : \"create-annotation\"},\n          {\"Name\": \"Status\", \"Value\"\
            : \"user_error\"}\n        ]\n      },\n      \"Period\": 60,\n      \"\
            Stat\": \"SampleCount\"\n    },\n    \"ReturnData\": false\n  },\n  {\n\
            \    \"Id\": \"system_error_metric\",\n    \"MetricStat\": {\n      \"\
            Metric\": {\n        \"Namespace\": \"Nobl9SlackApp\",\n        \"MetricName\"\
            : \"CommandResponseTime\",\n        \"Dimensions\": [\n          {\"Name\"\
            : \"Environment\", \"Value\": \"staging\"},\n          {\"Name\": \"CommandType\"\
            , \"Value\": \"create-annotation\"},\n          {\"Name\": \"Status\"\
            , \"Value\": \"system_error\"}\n        ]\n      },\n      \"Period\"\
            : 60,\n      \"Stat\": \"SampleCount\"\n    },\n    \"ReturnData\": false\n\
            \  },\n  {\n    \"Id\": \"success_total_filled\",\n    \"Expression\"\
            : \"FILL(success_metric, 0)\",\n    \"Period\": 60,\n    \"ReturnData\"\
            : false\n  },\n  {\n    \"Id\": \"user_error_total_filled\",\n    \"Expression\"\
            : \"FILL(user_error_metric, 0)\",\n    \"Period\": 60,\n    \"ReturnData\"\
            : false\n  },\n  {\n    \"Id\": \"system_error_filled\",\n    \"Expression\"\
            : \"FILL(system_error_metric, 0)\",\n    \"Period\": 60,\n    \"ReturnData\"\
            : false\n  },\n  {\n    \"Id\": \"total_sum\",\n    \"Expression\": \"\
            success_total_filled + user_error_total_filled + system_error_filled\"\
            ,\n    \"Period\": 60,\n    \"ReturnData\": true\n  }\n]\n"
          region: eu-central-1
    displayName: 99.5% System Availability
    name: objective-1
    target: 0.995
    value: 0
  service: slack-bot
  timeWindows:
  - count: 7
    isRolling: true
    unit: Day
