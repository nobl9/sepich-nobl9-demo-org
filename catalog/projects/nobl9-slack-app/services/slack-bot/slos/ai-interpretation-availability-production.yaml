apiVersion: n9/v1alpha
kind: SLO
metadata:
  displayName: AI Interpretation - Availability (Production)
  labels:
    environment:
    - production
  name: ai-interpretation-availability-production
  project: nobl9-slack-app
spec:
  budgetingMethod: Timeslices
  description: 'User journey: User types a natural language query that falls back
    to AI interpretation

    What we measure: AI interpretation availability (excluding expected rejections)

    Target: 95% of time slices have availability at or above 95%


    Why this matters: Failed AI interpretation means users get no answer to natural
    language queries

    Why 95%: AI depends on external Claude API; allows headroom for API issues and
    parse failures


    SLI: success / (success + api_error + parse_error + timeout) over 1h window

    No-traffic periods return 1.0 (100% available, no budget burn)

    '
  indicator:
    metricSource:
      kind: Agent
      name: groundcover-n9slackapp
      project: nobl9-slack-app
  objectives:
  - displayName: 95% AI Availability
    name: objective-1
    op: gte
    rawMetric:
      query:
        prometheus:
          promql: sum(increase(n9slackapp_ai_duration_milliseconds_count{environment="production",ai_status="success"}[1h]))
            / sum(increase(n9slackapp_ai_duration_milliseconds_count{environment="production",ai_status=~"success|api_error|parse_error|timeout"}[1h]))
            OR vector(1)
    target: 0.95
    timeSliceTarget: 0.95
    value: 0.95
  service: slack-bot
  timeWindows:
  - count: 7
    isRolling: true
    unit: Day
