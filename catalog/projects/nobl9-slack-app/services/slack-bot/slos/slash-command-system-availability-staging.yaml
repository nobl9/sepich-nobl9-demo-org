apiVersion: n9/v1alpha
kind: SLO
metadata:
  displayName: Slash Command - System Availability (Staging)
  labels:
    environment:
    - staging
  name: slash-command-system-availability-staging
  project: nobl9-slack-app
spec:
  budgetingMethod: Occurrences
  description: 'User journey: DevOps/SRE teams execute Slack commands to manage SLOs

    What we measure: System availability for all slash command interactions

    Target: 99.5% of commands succeed without system failures


    Why this matters: Failed commands block teams from managing SLOs and viewing error
    budgets

    Why 99.5%: Allows ~7 hours/month for maintenance while maintaining high reliability


    Excludes from denominator (user errors):

    - Authentication failures (bad credentials)

    - Validation errors (invalid syntax)

    - Not found errors (resource doesn''t exist)


    Good events: success + user_error

    Total events: all requests

    SLI = (success + user_error) / total

    '
  indicator:
    metricSource:
      kind: Direct
      name: cloudwatch-n9slackapp
      project: nobl9-slack-app
  objectives:
  - countMetrics:
      good:
        cloudWatch:
          json: "[\n  {\n    \"Id\": \"success_metric\",\n    \"MetricStat\": {\n\
            \      \"Metric\": {\n        \"Namespace\": \"Nobl9SlackApp\",\n    \
            \    \"MetricName\": \"CommandResponseTime\",\n        \"Dimensions\"\
            : [\n          {\"Name\": \"Environment\", \"Value\": \"staging\"},\n\
            \          {\"Name\": \"Status\", \"Value\": \"success\"}\n        ]\n\
            \      },\n      \"Period\": 60,\n      \"Stat\": \"SampleCount\"\n  \
            \  },\n    \"ReturnData\": false\n  },\n  {\n    \"Id\": \"user_error_metric\"\
            ,\n    \"MetricStat\": {\n      \"Metric\": {\n        \"Namespace\":\
            \ \"Nobl9SlackApp\",\n        \"MetricName\": \"CommandResponseTime\"\
            ,\n        \"Dimensions\": [\n          {\"Name\": \"Environment\", \"\
            Value\": \"staging\"},\n          {\"Name\": \"Status\", \"Value\": \"\
            user_error\"}\n        ]\n      },\n      \"Period\": 60,\n      \"Stat\"\
            : \"SampleCount\"\n    },\n    \"ReturnData\": false\n  },\n  {\n    \"\
            Id\": \"success_filled\",\n    \"Expression\": \"FILL(success_metric,\
            \ 0)\",\n    \"Period\": 60,\n    \"ReturnData\": false\n  },\n  {\n \
            \   \"Id\": \"user_error_filled\",\n    \"Expression\": \"FILL(user_error_metric,\
            \ 0)\",\n    \"Period\": 60,\n    \"ReturnData\": false\n  },\n  {\n \
            \   \"Id\": \"good_total\",\n    \"Expression\": \"success_filled + user_error_filled\"\
            ,\n    \"Period\": 60,\n    \"ReturnData\": true\n  }\n]\n"
          region: eu-central-1
      incremental: false
      total:
        cloudWatch:
          json: "[\n  {\n    \"Id\": \"total_metric\",\n    \"MetricStat\": {\n  \
            \    \"Metric\": {\n        \"Namespace\": \"Nobl9SlackApp\",\n      \
            \  \"MetricName\": \"CommandResponseTime\",\n        \"Dimensions\": [\n\
            \          {\"Name\": \"Environment\", \"Value\": \"staging\"}\n     \
            \   ]\n      },\n      \"Period\": 60,\n      \"Stat\": \"SampleCount\"\
            \n    },\n    \"ReturnData\": false\n  },\n  {\n    \"Id\": \"total_filled\"\
            ,\n    \"Expression\": \"FILL(total_metric, 0)\",\n    \"Period\": 60,\n\
            \    \"ReturnData\": true\n  }\n]\n"
          region: eu-central-1
    displayName: 99.5% System Availability
    name: objective-1
    target: 0.995
    value: 0
  service: slack-bot
  timeWindows:
  - count: 7
    isRolling: true
    unit: Day
