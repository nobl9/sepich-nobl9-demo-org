apiVersion: n9/v1alpha
kind: SLO
metadata:
  displayName: Webhook Delivery - System Availability (Production)
  labels:
    environment:
    - production
  name: webhook-delivery-availability-production
  project: nobl9-slack-app
spec:
  budgetingMethod: Timeslices
  description: 'User journey: Nobl9 sends alert webhooks that get delivered to Slack
    channels

    What we measure: System availability for webhook alert delivery

    Target: 99% of time slices have availability at or above 99%


    Why this matters: Failed alert delivery means teams miss critical SLO violations

    Why 99%: Webhooks depend on external Slack API; allows headroom for transient
    Slack outages


    SLI: success / (success + system_error + slack_error + auth_error) over 1h window

    No-traffic periods return 1.0 (100% available, no budget burn)

    '
  indicator:
    metricSource:
      kind: Agent
      name: groundcover-n9slackapp
      project: nobl9-slack-app
  objectives:
  - displayName: 99% System Availability
    name: objective-1
    op: gte
    rawMetric:
      query:
        prometheus:
          promql: sum(increase(n9slackapp_webhook_duration_milliseconds_count{environment="production",status="success"}[1h]))
            / sum(increase(n9slackapp_webhook_duration_milliseconds_count{environment="production",status=~"success|system_error|slack_error|auth_error"}[1h]))
            OR vector(1)
    target: 0.99
    timeSliceTarget: 0.99
    value: 0.99
  service: slack-bot
  timeWindows:
  - count: 7
    isRolling: true
    unit: Day
