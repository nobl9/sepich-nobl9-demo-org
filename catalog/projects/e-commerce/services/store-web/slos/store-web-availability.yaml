apiVersion: n9/v1alpha
kind: SLO
metadata:
  displayName: Store Website Availability
  labels:
    composite-demo:
    - composite-demo
  name: store-web-availability
  project: e-commerce
spec:
  budgetingMethod: Occurrences
  description: ''
  indicator:
    metricSource:
      kind: Agent
      name: prometheus
      project: e-commerce
  objectives:
  - displayName: Availability
    name: availability
    op: lt
    primary: true
    rawMetric:
      query:
        prometheus:
          promql: (time()*1+10)%(minute(vector(time()*1+10*60))+1)
    target: 0.95
    value: 50
  service: store-web
  timeWindows:
  - count: 28
    isRolling: true
    unit: Day
