apiVersion: n9/v1alpha
kind: SLO
metadata:
  displayName: Checkout Latency
  name: latency
  project: demo
spec:
  alertPolicies:
  - 10x-burn-1-hour
  budgetingMethod: Occurrences
  description: ''
  indicator:
    metricSource:
      kind: Direct
      name: glitchy-zoomies
      project: integrations
  objectives:
  - displayName: Latency
    name: latency
    op: lte
    primary: false
    rawMetric:
      query:
        gcm:
          projectId: glitchy-zoomies
          promql: 1000 * histogram_quantile(0.90, sum by (le) (rate(demo_request_duration_seconds_bucket{service="payments",path="/work"}[1m])))
    target: 0.95
    value: 500
  service: checkout
  timeWindows:
  - count: 28
    isRolling: true
    unit: Day
