apiVersion: n9/v1alpha
kind: AlertPolicy
metadata:
  displayName: less than 20%
  name: less-than-20
  project: operations
spec:
  alertMethods: []
  conditions:
  - lastsFor: 1h
    measurement: burnedBudget
    op: gte
    value: 0.8
  coolDown: 5m
  description: The error budget is nearly exhausted (20%).
  severity: Low
