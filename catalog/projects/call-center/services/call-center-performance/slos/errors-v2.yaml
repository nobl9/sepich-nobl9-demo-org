apiVersion: n9/v1alpha
kind: SLO
metadata:
  displayName: Call Errors
  labels:
    datasource:
    - appd
    slo_type:
    - error_rate
  name: errors-v2
  project: call-center
spec:
  budgetingMethod: Occurrences
  description: ''
  indicator:
    metricSource:
      kind: Direct
      name: appdynamics
      project: integrations
  objectives:
  - displayName: Errors
    name: ok
    op: lt
    primary: false
    rawMetric:
      query:
        appDynamics:
          applicationName: samplenodeapp
          metricPath: Overall Application Performance|WebApplication|Errors per Minute
    target: 0.99
    value: 75
  service: call-center-performance
  timeWindows:
  - count: 28
    isRolling: true
    unit: Day
