apiVersion: n9/v1alpha
kind: SLO
metadata:
  displayName: Call Errors
  labels:
    datasource:
    - appd
    slo_type:
    - error_rate
    app-id:
    - app-ddb899d8
    ad-group-name:
    - AD-N9-CallCenter-Owners
    cost-center:
    - CC-1000
    business-unit:
    - Demo Platforms
    env-type:
    - prod
    business-criticality-tier:
    - tier1
  name: errors-v2
  project: call-center
spec:
  budgetingMethod: Occurrences
  description: ''
  indicator:
    metricSource:
      kind: Direct
      name: appdynamics
      project: integrations
  objectives:
  - displayName: Errors
    name: ok
    op: lt
    primary: false
    rawMetric:
      query:
        appDynamics:
          applicationName: samplenodeapp
          metricPath: Overall Application Performance|WebApplication|Errors per Minute
    target: 0.99
    value: 75
  service: call-center-performance
  timeWindows:
  - count: 28
    isRolling: true
    unit: Day
