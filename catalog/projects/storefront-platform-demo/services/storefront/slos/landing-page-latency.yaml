apiVersion: n9/v1alpha
kind: SLO
metadata:
  displayName: Landing Page p90 Latency
  labels:
    ad-group-name:
    - AD-N9-StorefrontPlatform-Owners
    app-id:
    - app-c36bf0f7
    business-unit:
    - Demo Platforms
    cost-center:
    - CC-1000
    critical-app:
    - 'true'
    env-type:
    - prod
    owner:
    - demo-platform
    service-tier:
    - tier1
  name: landing-page-latency
  project: storefront-platform-demo
spec:
  alertPolicies:
  - landing-page-latency-fast-burn
  budgetingMethod: Occurrences
  description: p90 latency SLO for the primary storefront visitor path.
  indicator:
    metricSource:
      kind: Direct
      name: glitchy-zoomies
      project: integrations
  objectives:
  - displayName: p90 under 1000 milliseconds
    name: latency
    op: lte
    rawMetric:
      query:
        gcm:
          projectId: glitchy-zoomies
          promql: 1000 * histogram_quantile(0.90, sum by (le) (rate(demo_request_duration_seconds_bucket{service="landing_page",path="/api/visit"}[1m])))
    target: 0.95
    value: 1000
  service: storefront
  timeWindows:
  - count: 7
    isRolling: true
    unit: Day
