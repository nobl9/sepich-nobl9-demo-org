apiVersion: n9/v1alpha
kind: SLO
metadata:
  displayName: Payments p90 Latency
  labels:
    ad-group-name:
    - AD-N9-StorefrontPlatform-Owners
    app-id:
    - app-c36bf0f7
    business-unit:
    - Demo Platforms
    cost-center:
    - CC-1000
    critical-app:
    - 'true'
    env-type:
    - prod
    owner:
    - demo-platform
    service-tier:
    - tier2
    business-criticality-tier:
    - tier1
  name: payments-latency
  project: storefront-platform-demo
spec:
  alertPolicies:
  - payments-latency-fast-burn
  budgetingMethod: Occurrences
  description: p90 latency SLO for payment processing.
  indicator:
    metricSource:
      kind: Direct
      name: glitchy-zoomies
      project: integrations
  objectives:
  - displayName: p90 under 500 milliseconds
    name: latency
    op: lte
    rawMetric:
      query:
        gcm:
          projectId: glitchy-zoomies
          promql: 1000 * histogram_quantile(0.90, sum by (le) (rate(demo_request_duration_seconds_bucket{service="payments",path="/work"}[1m])))
    target: 0.95
    value: 500
  service: payment-processing
  timeWindows:
  - count: 7
    isRolling: true
    unit: Day
