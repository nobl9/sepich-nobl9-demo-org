apiVersion: n9/v1alpha
kind: AlertPolicy
metadata:
  displayName: Inventory p90 Latency Fast Burn
  labels:
    app-id:
    - storefront-platform-app
    critical-app:
    - 'true'
    owner:
    - demo-platform
    service-tier:
    - tier2
  name: inventory-latency-fast-burn
  project: storefront-platform-demo
spec:
  alertMethods: []
  conditions:
  - alertingWindow: 5m
    measurement: averageBurnRate
    op: gte
    value: 20
  coolDown: 5m
  description: Fast burn alert policy for inventory p90 latency.
  severity: High
