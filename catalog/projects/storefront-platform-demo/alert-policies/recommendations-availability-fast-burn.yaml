apiVersion: n9/v1alpha
kind: AlertPolicy
metadata:
  displayName: Recommendations Availability Fast Burn
  labels:
    ad-group-name:
    - AD-N9-StorefrontPlatform-Owners
    app-id:
    - app-c36bf0f7
    business-criticality-tier:
    - tier1
    business-unit:
    - Demo Platforms
    cost-center:
    - CC-1000
    critical-app:
    - 'true'
    env-type:
    - prod
    owner:
    - demo-platform
    service-tier:
    - tier2
  name: recommendations-availability-fast-burn
  project: storefront-platform-demo
spec:
  alertMethods: []
  conditions:
  - alertingWindow: 5m
    measurement: averageBurnRate
    op: gte
    value: 20
  coolDown: 5m
  description: Fast burn alert policy for Recommendations availability.
  severity: High
