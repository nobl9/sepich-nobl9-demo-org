apiVersion: n9/v1alpha
kind: SLO
metadata:
  displayName: Product Catalog Response Time 1
  name: product-catalog-response-time-1
  project: opentelemetry-astronomy-shop
spec:
  budgetingMethod: Occurrences
  description: ''
  indicator:
    metricSource:
      kind: Direct
      name: glitchy-zoomies
      project: integrations
  objectives:
  - displayName: Latency
    name: p95-latency-under-1s
    op: lte
    rawMetric:
      query:
        gcm:
          projectId: glitchy-zoomies
          promql: 1000 * histogram_quantile(0.90, sum by (le) (rate(demo_request_duration_seconds_bucket{service="inventory",path="/work"}[1m])))
    target: 0.95
    value: 500
  service: product-catalog
  timeWindows:
  - count: 28
    isRolling: true
    unit: Day
