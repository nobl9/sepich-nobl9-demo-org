apiVersion: n9/v1alpha
kind: SLO
metadata:
  displayName: Checkout Success Rate
  name: checkout-success-rate
  project: opentelemetry-astronomy-shop
spec:
  budgetingMethod: Occurrences
  description: ''
  indicator:
    metricSource:
      kind: Direct
      name: n9-partner-sample-app
      project: integrations
  objectives:
  - countMetrics:
      good:
        gcm:
          projectId: n9-partner-sample-app
          promql: sum(rate(app_frontend_requests_total{target="/api/checkout",status="200"}[1m]))
      incremental: false
      total:
        gcm:
          projectId: n9-partner-sample-app
          promql: sum(rate(app_frontend_requests_total{target="/api/checkout"}[1m]))
    displayName: Checkout Success Rate
    name: objective-1
    primary: false
    target: 0.999
    value: 0
  service: payment
  timeWindows:
  - count: 28
    isRolling: true
    unit: Day
