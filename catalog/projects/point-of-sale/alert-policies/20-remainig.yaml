apiVersion: n9/v1alpha
kind: AlertPolicy
metadata:
  displayName: 20% Remainig
  labels:
    composite-demo:
    - composite-demo
  name: 20-remainig
  project: point-of-sale
spec:
  alertMethods:
  - apiVersion: n9/v1alpha
    kind: AlertMethod
    metadata:
      name: email
      project: e-commerce
    spec:
      description: ''
      email:
        to:
        - jakub.gruszecki+email-e-commerce-nobl9-dogfood-dev-demo-1@nobl9.com
  conditions:
  - lastsFor: 10m
    measurement: burnedBudget
    op: gte
    value: 0.8
  coolDown: 5m
  description: The error budget is nearly exhausted (20%).
  severity: High
