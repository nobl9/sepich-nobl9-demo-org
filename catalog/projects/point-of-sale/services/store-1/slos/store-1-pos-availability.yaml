apiVersion: n9/v1alpha
kind: SLO
metadata:
  displayName: Availability
  labels:
    location:
    - Detroit
  name: store-1-pos-availability
  project: point-of-sale
spec:
  budgetingMethod: Occurrences
  description: ''
  indicator:
    metricSource:
      kind: Direct
      name: dantestingdt2
      project: integrations
  objectives:
  - displayName: Point of Sale Avaialbility
    name: availability
    op: gt
    primary: false
    rawMetric:
      query:
        dynatrace:
          metricSelector: builtin:synthetic.http.availability.location.total:filter(and(or(in("dt.entity.http_check",entitySelector("type(http_check),entityName.equals(~"www.wienershirtzel.com~")"))))):splitBy():sort(value(auto,descending)):limit(20)
    target: 0.995
    value: 99
  service: store-1
  timeWindows:
  - count: 28
    isRolling: true
    unit: Day
