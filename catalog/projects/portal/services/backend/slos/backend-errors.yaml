apiVersion: n9/v1alpha
kind: SLO
metadata:
  displayName: Backend Errors
  labels:
    onprem:
    - 'true'
  name: backend-errors
  project: portal
spec:
  budgetingMethod: Occurrences
  description: ''
  indicator:
    metricSource:
      kind: Direct
      name: glitchy-zoomies
      project: integrations
  objectives:
  - displayName: Backend Errors
    name: backend-errors
    op: lte
    primary: false
    rawMetric:
      query:
        gcm:
          projectId: glitchy-zoomies
          promql: 1 - ((sum(increase(demo_requests_total{service="inventory",path="/work",status=~"2.."}[1m])))
            / clamp_min(sum(increase(demo_requests_total{service="inventory",path="/work"}[1m])),
            1))
    target: 0.99
    value: 0.005
  service: backend
  timeWindows:
  - count: 28
    isRolling: true
    unit: Day
