version: v1
policy_name: enterprise-deploy-time-slo-governance
description: >
  Enterprise reliability governance model for production deployments. Teams can
  discover and draft SLOs in the UI, from templates, or with AI. Promotion to
  production is governed by inventory, standards, and approved exceptions.

governance_model:
  source_of_truth: git
  creation_surfaces:
    - nobl9-ui
    - templates
    - ai-assisted
  enforcement_point: enterprise-deployment-pipeline
  advisory_points:
    - team-local-review
    - design-time-slo-creation

inventory_selection:
  auto_include_if_app_tier_in:
    - tier1
  app_criticality_field: business_criticality_tier
  app_id_label: app-id
  project_name_suffix: -demo
  service_tier_label: business-criticality-tier
  default_service_tier: unknown

release_gate:
  enforce_at_pr: false
  enforce_at_deploy: true
  fail_on_missing_inventory: true
  fail_on_missing_governed_service: true
  fail_on_missing_required_labels: true
  fail_on_missing_required_slos: true
  fail_on_hidden_alert_method_secrets: true

anomaly_gate:
  enabled: true
  environments:
    - production
  lookback_hours: 24
  fail_on_active_categories:
    - NoDataAnomaly
    - NoBurnAnomaly
    - ConstantBurnAnomaly
    - IncrementalMismatchAnomaly
  warn_on_active_categories: []

required_metadata_labels:
  - app-id
  - ad-group-name
  - cost-center
  - business-unit
  - env-type
  - business-criticality-tier

service_tiers:
  tier1:
    display_name: Critical user-facing path
    required_slos:
      - availability
      - latency
    deploy_enforcement: required
  tier2:
    display_name: Critical dependency
    required_slos: []
    deploy_enforcement: warning
  tier3:
    display_name: Non-critical or onboarding
    required_slos: []
    deploy_enforcement: warning
  unknown:
    display_name: Service tier not yet declared
    required_slos: []
    deploy_enforcement: warning
